<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" font-family="Helvetica, Arial, sans-serif">
  <!-- Stage 1 · CONCEPT — full-body silhouette + read · seeded from Penitent-Knight_modelsheet-front framing -->
  <rect width="800" height="1200" fill="#8b8b8b"/>

  <!-- safe margins -->
  <rect x="56" y="48" width="688" height="1104" fill="none" stroke="#d6408b" stroke-width="2" stroke-dasharray="10 8" opacity="0.7"/>

  <!-- center axis -->
  <line x1="400" y1="60" x2="400" y2="1140" stroke="#d6408b" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.55"/>

  <!-- figure zone: crown → ground, head = 1/8 (adjust per character) -->
  <circle cx="400" cy="174" r="64" fill="none" stroke="#d6408b" stroke-width="2" stroke-dasharray="6 6" opacity="0.8"/>
  <text x="480" y="180" font-size="20" fill="#3a3a3a">head zone</text>
  <line x1="120" y1="110" x2="680" y2="110" stroke="#d6408b" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.6"/>
  <text x="124" y="102" font-size="18" fill="#3a3a3a">crown</text>

  <!-- silhouette body zone -->
  <rect x="200" y="110" width="400" height="1020" fill="#d6408b" opacity="0.06"/>

  <!-- ground -->
  <line x1="80" y1="1130" x2="720" y2="1130" stroke="#3a3a3a" stroke-width="2.5"/>
  <ellipse cx="400" cy="1130" rx="170" ry="16" fill="#3a3a3a" opacity="0.25"/>
  <text x="84" y="1122" font-size="18" fill="#3a3a3a">ground line — feet planted, small contact shadow</text>

  <!-- header + rules -->
  <text x="56" y="34" font-size="24" font-weight="bold" fill="#2c2c2c">CONCEPT — &lt;Name&gt;_concept-v1</text>
  <text x="56" y="1176" font-size="17" fill="#2c2c2c">2:3 · full body, silhouette-first · in-world background allowed — keep values quiet behind the figure</text>
  <text x="56" y="1196" font-size="17" fill="#2c2c2c">read test: domain + attitude + one signature tell, legible at thumbnail size</text>
</svg>
